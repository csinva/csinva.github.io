<!-- Shared <head> boilerplate for the deep-dive pages, pulled in by each
     page in /deep-dive/ with a Liquid include tag. Pages keep their own
     <title>, page-specific <style>, and (optionally) the assets/deepdive.css
     link; everything common lives here. -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/favicon.svg">

<!-- GoatCounter analytics (privacy-friendly, no cookies).
     Prepend location.host to the path so hits from other subdomains
     (e.g. blog.csinva.io) are tracked in this same account but stay
     distinguishable in the dashboard. -->
<script>
    window.goatcounter = {
        path: function (p) { return location.host + p }
    }
</script>
<script data-goatcounter="https://csinva.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
