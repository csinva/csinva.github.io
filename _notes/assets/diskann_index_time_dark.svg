<text x="491" y="170" text-anchor="middle" dominant-baseline="central" style="fill:#B4B2A9;fill:rgb(180, 178, 169);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">flat, few longer hops</text>

