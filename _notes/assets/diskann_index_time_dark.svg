<rect x="350" y="236" width="274" height="104" rx="10" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4" style="fill:none;stroke:rgb(136, 135, 128);color:rgb(11, 11, 11);stroke-width:0.5px;stroke-dasharray:4px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
